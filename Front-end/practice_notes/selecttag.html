<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Select Tag Demo</h2>
    <form action="submit.html" method="get"> 
        Select Country:
        <select name="country">
            <option>India</option>
            <option>USA</option>
            <option>UK</option>
        </select><br><br>
        Select Skills:
        <select multiple size="4">
            <option>Java</option>
             <option>HTML</option>
              <option>CSS</option>
               <option>JavaScript</option>
        </select><br><br>
Disabled DropDown:
<select disabled>
    <option>Kerala</option>
    <option>Tamil Nadu</option>
</select><br><br>
<input type="submit">
    </form>
</body>
</html>

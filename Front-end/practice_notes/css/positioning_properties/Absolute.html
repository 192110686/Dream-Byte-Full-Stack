<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            margin:0;
            background-color: #f5f5f5;
        }
        h1{
            text-align: center;
        }
        .box{
            width:180px;
            height:80px;
            color:white;
            font-size:20px;
            font-weight: bold;
            text-align:center;
            line-height: 80px;
            margin:15px;
        }
        .box1{
            background-color: crimson;
        }
        .box2{
            background-color: royalblue;
            position: absolute;
            top:120px;
            left:350px;
        }
        .box3{
            background-color: seagreen;
        }
        .parent{
            position: relative;
            width: 500px;
            height:300px;
            border: 2px solid black;
        }

    </style>
</head>
<body>
    <h1>Absolute Position Without Positioned Parent</h1>
    <div class="box box1">Box one</div>
    <div class="parent">
      <div class="box box2">Box Two</div>
      </div>
        <div class="box box3">Box Three</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            min-height: 100vh;
            margin:0;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .notification-wrapper{
            width:80px;
            height:80px;
            border-radius: 50%;
            background-color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            position:relative;
        }
        .bell-icon{
            font-size: 42px;
        }
        .notification-count{
            width:28px;
            height: 28px;
            border-radius: 50%;
            background-color: red;
            color:white;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            line-height: 28px;
            position: absolute;
            top:-5px;
            right:-5px;
        }
    </style>
</head>
<body>
    <div class="notification-wrapper">
        <span class="bell-icon">
            🔔
        </span>
        <span class="notification-count">9</span>
    </div>
</body>
</html>

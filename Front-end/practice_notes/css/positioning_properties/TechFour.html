<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
          body{
            font-family: Arial, Helvetica, sans-serif;
            padding: 50px;
            background-color: #181818;
        }
        h1{
            color:white;
            text-align: center;
        }
        .video-card{
            width:420px;
            margin:40px auto;
        }
        .thumbnail{
            width: 100%;
            height: 240px;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }
        .thumbnail img{
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .duration{
            padding:5px 8px;
            border-radius: 4px;
            background-color: rgba(0,0,0,0.85);
            color:white;
            font-size: 14px;
            font-weight: bold;
            position:absolute;
            right:10px;
            bottom:10px;
        }
        .video-title{
            color: white;
            font-size: 20px;
            margin-top: 15px;
        }
        .channel-name:{
            color:#b3b3b3;
        }
    </style>
</head>
<body>
    <h1>Youtube-Style Video Card</h1>
    <div class="Video-card">
        <div class="thumbnail">
            <img src="https://plus.unsplash.com/premium_photo-1668116307088-583ee0d4aaf7?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NXx8dGh1bWJuYWlsfGVufDB8fDB8fHww" alt="Video Thumbnail">
            <span class="duration">12:45</span>
        </div>
        <h2 class="video-title">Learn CSS Positioning Clearly</h2>
        <p class="channel-name">Dreambyte Academy</p>
    </div>
</body>
</html>

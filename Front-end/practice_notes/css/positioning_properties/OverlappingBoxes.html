<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f3f4f5;
            padding: 40px;
        }
        h1{
            text-align: center;
        }
        .container{
            width:500px;
            height:350px;
            margin:40px auto;
            border:3px solid black;
            background-color: white;
            position: relative;
        }
        .box{
            width: 180px;
            height: 180px;
            color:white;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            line-height: 180px;
            position: absolute;
        }
        .red-box{
            top:40px;
            left:40px;
            background-color: crimson;
            z-index: 1;
        }
        .blue-box{
            top:90px;
            keft:100px;
            background-color: royalblue;
            z-index: 3;
        }
        .green-box{
            top:140px;
            left:160px;
            background-color: seagreen;
            z-index: 2;
        }
    </style>
</head>
<body>
    <h1>Z-Index and Stacking Order</h1>
    <div class="container">
        <div class="box red-box">Z-Index 1</div>
        <div class="box blue-box">Z-Index 3</div>
        <div class="box green-box">Z-Index 2</div>
    </div>
</body>
</html>

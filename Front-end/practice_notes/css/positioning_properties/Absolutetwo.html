<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
         body{
            font-family: Arial, Helvetica, sans-serif;
            margin:0;
            background-color: #f5f5f5;
        }
        h1{
            text-align: center;
        }
        .parent{
            width: 500px;
        height:300px;
        margin:40px auto;
        border:4px solid black;
        background-color: white;
        position: relative;
        }
        .child{
            width: 120px;
            height:70px;
        background-color: crimson;
    color: white;
    font-size: 18px;
    font-weight: bold;
    text-align: center;
    line-height: 70px;
    position: absolute;
    top:20px;
    right:20px;
}
    </style>
</head>
<body>
    <h1>Relative parennt and absolute child</h1>
    <div class="parent">
        <div class="child">
            Child
        </div>
    </div>
</body>
</html>

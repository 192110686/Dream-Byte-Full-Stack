<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
       body{
            margin:0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f8fafc;
        }
        .navbar{
            width:100%;
            padding:20px 30px;
            box-sizing:border-box;
            background-color: #111827;
            color:white;
            position: fixed;
            top:0;
            left:0;
            z-index: 1000;
        
        }
        .navbar a{
            margin-right: 25px;
            color: white;
        }
        .banner{
            height:350px;
            margin-top: 80px;
            background-color: royalblue;
            color:white;
            font-size: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            top:-20px;
        }
        .content{
            padding:40px;
        }
           .section{
            min-height: 500px;
            background-color: white;
            border-radius: 10px;
            margin-bottom: 30px 0px;
            padding:30px;
            box-shadow: 0 3px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
        <nav class="navbar">
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">Servies</a>
        <a href="#">Contact</a>
    </nav>
    <section class="banner">
        Website Banner
    </section>
    <main class="content">
        <h2>Main Content</h2>
        <p>The navbar remains above the banner because it has a higher z-index</p>
           <section class="section">
            <h2>Our Services</h2>
            <p>Fixed elements stay attached to the viewport.</p>
        </section>
        <section class="section">
            <h2>Contact Us</h2>
            <p>Fixed elements stay attached to the viewport.</p>
        </section>
    </main>
</body>
</html>

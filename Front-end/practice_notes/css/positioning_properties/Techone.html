<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: #111827;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .buy-button{
            padding: 16px 35px;
            border:none;
            border-radius: 8px;
            background-color: #22c55e;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            position: relative;
            transition: 0.3s;
        }
        .buy-button:hover{
            top:-6px;
        }
    </style>
</head>
<body>
    <button class="buy-button">Buy Now</button>
</body>
</html>

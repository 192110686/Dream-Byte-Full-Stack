<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f6f8;
            padding:30px;
        }
        h1{
            text-align: center;
            margin-bottom: 30px;
        }
        .container{
            width:500px;
            margin:40px auto;
            padding:25px;
            border:3px solid black;
            background-color: white;
        }
         .box{
            width:250px;
            padding:25px;
            margin: 15px auto;
            border:2px solid black;
            text-align: center;
            font-size:20px;
            font-weight:bold;
        } 
        .box1{
            background-color: lightcoral;
        }
        .box2{
            background-color: lightblue;
            position: relative;
            top:40px;
            left:120px;
        }
        .box3{
            background-color: lightgreen;
        }
    </style>
</head>
<body>
    <h1>Normal Document</h1>
    <div class="container">
    <div class="box box1">Box One</div>
    <div class="box box2">Box Two</div>
    <div class="box box3">Box Three</div>
    </div>
</body>
</html>

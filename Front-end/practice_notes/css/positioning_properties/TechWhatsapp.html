<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin:0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f8fafc;
        }
        header{
            padding: 25px;
            background-color: #0f172a;
            color:white;
            text-align:center;
        }
        .content{
            width:80%;
            margin:auto;
            padding:30px;
        }
        .section{
            min-height:500px;
            margin-botom:30px;
            padding:30px;
            border-radius: 10px;
            background-color: white;
            box-shadow:0 3px 15px rgba(0,0,0,0.1);
        }
        .chat-button{
            width: 65px;
            height:65px;
            border-radius: 50%;
            background-color: #25d366;
            color:white;
            font-size:30px;
            text-align: center;
            line-height: 65px;
            text-decoration: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            position: fixed;
            right:25px;
            bottom:25px;
        }
    </style>
</head>
<body>
    <header>
    <h1>My Business Website</h1>
    </header>
    <main class="content">
        <section class="section">
            <h2>About Us</h2>
            <p>Scroll the page and observse the chat button.</p>
        </section>
        <section class="section">
            <h2>Our Services</h2>
            <p>
                The button remains fixed at the bottom right.
            </p>
        </section>
        <section>
            <h2>Contact Us</h2>
            <p>Fixed elements stay attached to the viewport.</p>
        </section>
    </main>
    <!-- to make a phone call works for below code -->
    <!-- <a href="tel:+917780597767"
    class="chat-button"
    aria-label="Call us">☎️</a> -->
    <!-- to open a whatsapp chat -->
     <a href="https://wa.me/917780597767"
    class="chat-button"
    target="_blank"
    aria-label="Chat with us">☎️</a>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box1{
            display:block;
            border:2px solid black;
        }
        .box2{
            display:inline-block;
            visibility: hidden;
            border:2px solid blue;
        }
        .box3{
            display:inine;
            width:100px;
            height:100px;
            border:2px solid green;
        }
    </style>
</head>
<body>
    <span class="box1">Block</span>
    <br><br>
    <div class="box2">Inline 1</div>
     <div class="box2">Inline 2</div>
     <br><br>
     <div class="box3">A</div>
     <div class="box3">B</div>
</body>
</html>
